# CodeMate tmux configuration
# Tuned for modern terminal emulators (iTerm2, Ghostty, WezTerm, Kitty).

# Mouse support: enables scroll wheel, pane click, drag-to-resize.
set -g mouse on

# Forward terminal focus-in/focus-out events to inner applications.
# Without this, Claude Code emits a "focus-events off" warning.
set -g focus-events on

# Forward Kitty Keyboard Protocol (CSI u) sequences so modified keys like
# Shift+Enter reach inner applications. 'always' bypasses the activation
# handshake that Claude Code does not perform when running inside tmux.
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Enable OSC 52 clipboard integration so yank/copy in tmux is forwarded to the
# host terminal's system clipboard, and allow passthrough escape sequences for
# inner applications that emit their own OSC 52 writes.
set -s set-clipboard on
set -g allow-passthrough on
