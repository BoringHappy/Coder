# CodeMate tmux configuration
# Tuned for modern terminal emulators (iTerm2, Ghostty, WezTerm, Kitty).

# Mouse support: enables scroll wheel, pane click, drag-to-resize.
set -g mouse on

# Forward terminal focus-in/focus-out events to inner applications.
# Without this, Claude Code emits a "focus-events off" warning.
set -g focus-events on

# Forward Kitty Keyboard Protocol (CSI u) sequences so modified keys reach
# inner applications when they activate the protocol. 'always' is avoided
# here: it encodes C-j (LF, the byte produced by pasted newlines) as a CSI u
# sequence, which Claude Code does not parse and renders as a stray 'j'
# between pasted lines. For Shift+Enter newline insertion, bind Shift+Enter
# in the outer terminal to send "\e\r" (Alt+Enter) instead.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
